name: Deploy Angular App to Plesk

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  BUILD_DIR: dist/browser
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-angular
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Validate build output
        run: |
          if [ ! -f "${{ env.BUILD_DIR }}/index.html" ]; then
            echo "ERROR: No se encontró index.html en ${{ env.BUILD_DIR }}"; exit 1
          fi
          echo "Build OK: index.html encontrado."

      - name: Compress build
        run: tar -czf dist-browser.tar.gz -C "${{ env.BUILD_DIR }}" .

      - name: Upload tar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: 'dist-browser.tar.gz'
          target: '~/deploy_tmp'

      - name: Deploy on server (clean & extract)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            TAR=~/deploy_tmp/dist-browser.tar.gz
            DEST="${{ secrets.REMOTE_PUBLIC_DIR }}"

            # Validaciones de seguridad
            if [ ! -f "$TAR" ]; then
              echo "ERROR: No se encontró el artefacto $TAR" >&2
              exit 1
            fi

            if [ ! -d "$DEST" ]; then
              echo "ERROR: El destino $DEST no existe" >&2
              exit 1
            fi

            case "$DEST" in
              /|/root|/home|/var|/var/www|/var/www/vhosts)
                echo "ERROR: Destino demasiado genérico. Abortando." >&2
                exit 1
                ;;
            esac

            # Extraer en carpeta temporal y validar antes de borrar el destino actual
            TMP_DIR=$(mktemp -d)
            tar -xzf "$TAR" -C "$TMP_DIR"

            if [ ! -f "$TMP_DIR/index.html" ]; then
              echo "ERROR: index.html no encontrado en el artefacto. Abortando." >&2
              rm -rf "$TMP_DIR"
              exit 1
            fi

            # Limpiar contenido actual
            cd "$DEST"
            find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +

            # Publicar nuevo build
            cp -r "$TMP_DIR"/* "$DEST"/

            # Limpieza final
            rm -rf "$TMP_DIR" "$TAR"

            echo "Despliegue completado en $DEST"
